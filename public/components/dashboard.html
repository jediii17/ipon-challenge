<!-- ===== MAIN CONTENT ===== -->
<main class="main-content">

  <!-- Sub-Account Selector -->
  <section class="selector-bar" id="selector-bar">
    <div class="selector-inner">
      <div class="selector-left">
        <h3 id="dashboard-title">Dashboard Overview</h3>
        <p id="dashboard-subtitle" class="text-muted">Viewing all accounts</p>
      </div>
      <div class="selector-right">
        <button class="btn btn-outline btn-sm" id="manage-users-btn" style="display:none; margin-right: 0.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Manage Users
        </button>
        <select id="user-filter" class="select-styled" style="display:none;">
          <option value="all">All Users</option>
        </select>
        <select id="subaccount-select" class="select-styled">
          <option value="all">All Accounts</option>
        </select>
        <button class="btn btn-primary" id="add-deposit-btn" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Record Deposit
        </button>
      </div>
    </div>
  </section>

  <!-- Stats Cards -->
  <section class="cards-grid" id="cards-grid">
    <div class="stat-card" id="card-total-saved">
      <div class="stat-card-icon blue">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </div>
      <div class="stat-card-body">
        <p class="stat-label">Total Saved</p>
        <h2 class="stat-value" id="stat-total-saved">₱0.00</h2>
      </div>
    </div>

    <div class="stat-card" id="card-interest">
      <div class="stat-card-icon green">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      </div>
      <div class="stat-card-body">
        <p class="stat-label">Interest Earned</p>
        <h2 class="stat-value" id="stat-interest">₱0.00</h2>
      </div>
    </div>

    <div class="stat-card" id="card-months">
      <div class="stat-card-icon purple">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="stat-card-body">
        <p class="stat-label">Months Elapsed</p>
        <h2 class="stat-value" id="stat-months">0</h2>
      </div>
    </div>

    <div class="stat-card" id="card-goal">
      <div class="stat-card-icon orange">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      </div>
      <div class="stat-card-body">
        <p class="stat-label">Avg. Goal Progress</p>
        <h2 class="stat-value" id="stat-goal">0%</h2>
      </div>
    </div>
  </section>

  <!-- Sub-Account Progress Cards -->
  <section class="progress-section" id="progress-section">
    <h3 class="section-title">Sub-Account Progress</h3>
    <div class="progress-grid" id="progress-grid">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- Charts -->
  <section class="charts-section">
    <div class="charts-grid">
      <div class="chart-card">
        <h4 class="chart-title">Deposit History Over Time</h4>
        <div class="chart-container">
          <div class="chart-wrapper-inner" id="line-chart-wrapper">
            <canvas id="line-chart"></canvas>
          </div>
        </div>
      </div>
      <div class="chart-card">
        <h4 class="chart-title">Monthly Deposits Comparison</h4>
        <div class="chart-container">
          <div class="chart-wrapper-inner" id="bar-chart-wrapper">
            <canvas id="bar-chart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Transaction Table -->
  <section class="table-section">
    <div class="table-header-bar">
      <h3 class="section-title">Transaction History</h3>
      <div class="table-controls">
        <button class="btn btn-outline btn-sm" id="download-csv-btn" style="display:none; margin-right: 0.5rem;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download CSV
        </button>
        <input type="text" id="table-search" placeholder="Search transactions..." class="input-styled">
      </div>
    </div>
    <div class="table-wrapper">
      <table class="data-table" id="transaction-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>User</th>
            <th>Type</th>
            <th>Sub-Account</th>
            <th>Amount</th>
            <th class="admin-only">Actions</th>
          </tr>
        </thead>
        <tbody id="transaction-tbody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination">
      <!-- Populated by JS -->
    </div>
  </section>

</main>

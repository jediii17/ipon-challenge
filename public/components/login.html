<!-- ==================== LOGIN SCREEN ==================== -->
<div id="login-screen" class="login-screen">
  <button class="btn btn-outline btn-sm" id="login-donate-btn" style="position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(30,41,59,0.6); color: #f1f5f9; border-color: rgba(255,255,255,0.2); backdrop-filter: blur(8px); display: inline-flex; align-items: center; gap: 0.4rem; z-index: 10; transition: all 0.2s;" title="Deposit Info" onmouseover="this.style.background='rgba(30,41,59,0.9)'; this.style.borderColor='rgba(255,255,255,0.4)';" onmouseout="this.style.background='rgba(30,41,59,0.6)'; this.style.borderColor='rgba(255,255,255,0.2)';">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    Deposit Info
  </button>
  <div class="login-card">
    <div class="login-logo">
        <img src="logo.png" alt="Ipon Challenge Logo" style="width: 100%; height: 100%; border-radius: 12px; object-fit: cover;">
      <h1>Ipon Challenge</h1>
      <p class="login-subtitle">Smart Savings Dashboard</p>
    </div>

    <div class="login-form">
      <div class="form-group">
        <label for="login-role">Login As</label>
        <select id="login-role">
          <option value="admin">Admin</option>
          <option value="user">Depositor / User</option>
        </select>
      </div>

      <div class="form-group" id="user-select-group" style="display:none;">
        <label for="login-user">Select User</label>
        <select id="login-user">
          <!-- Populated by JS -->
        </select>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="password-input-group">
          <input type="password" id="login-password" placeholder="Enter password">
          <button type="button" class="password-toggle" id="toggle-login-password">
            <svg id="eye-icon-login" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-off-icon-login" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="login-feedback" id="login-error" style="display:none; color: var(--red); font-size: 0.8rem; margin-top: 0.5rem; text-align: center;">Incorrect password. Please try again.</div>
      </div>

      <button id="login-btn" class="btn btn-primary btn-full">Sign In</button>
      <p class="login-hint">Enter your credentials to access the dashboard</p>
    </div>
  </div>
</div>
